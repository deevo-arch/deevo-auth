<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Deevo OAuth Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface-2: #1a1a24;
      --surface-border: #1e1e2a;
      --text: #e8e8ef;
      --text-dim: #8888a0;
      --primary: #6c5ce7;
      --primary-glow: rgba(108, 92, 231, 0.15);
      --success: #00d2a0;
      --success-dim: rgba(0, 210, 160, 0.1);
      --error: #ff6b6b;
      --error-dim: rgba(255, 107, 107, 0.1);
      --radius: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 600px 400px at 30% 20%, rgba(108, 92, 231, 0.08), transparent),
        radial-gradient(ellipse 500px 300px at 70% 80%, rgba(0, 210, 160, 0.05), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 32px;
    }

    .header-brand {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-logout {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--surface-border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-logout:hover {
      border-color: var(--error);
      color: var(--error);
      background: var(--error-dim);
    }

    /* Success Banner */
    .success-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--success-dim);
      border: 1px solid rgba(0, 210, 160, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--success);
      font-weight: 500;
    }

    .success-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(0, 210, 160, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    /* User Profile */
    .profile {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--success));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .profile-info p {
      color: var(--text-dim);
      font-size: 14px;
      margin-top: 4px;
    }

    .profile-info .uid {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--primary);
      margin-top: 6px;
      opacity: 0.8;
    }

    /* Data rows */
    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--surface-border);
    }
    .data-row:last-child { border-bottom: none; }

    .data-label {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .data-value {
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      max-width: 350px;
      text-align: right;
      word-break: break-all;
    }

    /* Token box */
    .token-box {
      background: var(--surface-2);
      border: 1px solid var(--surface-border);
      border-radius: 10px;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      word-break: break-all;
      line-height: 1.8;
      max-height: 120px;
      overflow-y: auto;
    }

    /* Verify button */
    .btn-verify {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 16px;
    }
    .btn-verify:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .verify-result {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }
    .verify-result.success {
      display: block;
      background: var(--success-dim);
      border: 1px solid rgba(0, 210, 160, 0.2);
      color: var(--success);
    }
    .verify-result.error {
      display: block;
      background: var(--error-dim);
      border: 1px solid rgba(255, 107, 107, 0.2);
      color: var(--error);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px 0;
      color: var(--text-dim);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--surface-border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <div class="header">
      <span class="header-brand">Test App</span>
      <a href="/auth/logout" class="btn-logout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </a>
    </div>

    <!-- Loading State -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      Loading your profile...
    </div>

    <!-- Content (hidden until loaded) -->
    <div id="content" style="display: none;">
      <!-- Success Banner -->
      <div class="success-banner">
        <div class="success-icon">✓</div>
        <div>
          <strong>OAuth flow completed successfully!</strong><br>
          <span style="font-weight: 400; font-size: 13px; opacity: 0.8;">Your Deevo account is connected.</span>
        </div>
      </div>

      <!-- User Profile Card -->
      <div class="card">
        <div class="card-title">User Profile</div>
        <div class="profile">
          <div class="avatar" id="avatar"></div>
          <div class="profile-info">
            <h2 id="user-name"></h2>
            <p id="user-email"></p>
            <div class="uid" id="user-sub"></div>
          </div>
        </div>
      </div>

      <!-- Raw Data Card -->
      <div class="card">
        <div class="card-title">Raw User Object (from SDK)</div>
        <div class="data-row">
          <span class="data-label">sub</span>
          <span class="data-value" id="data-sub"></span>
        </div>
        <div class="data-row">
          <span class="data-label">name</span>
          <span class="data-value" id="data-name"></span>
        </div>
        <div class="data-row">
          <span class="data-label">email</span>
          <span class="data-value" id="data-email"></span>
        </div>
        <div class="data-row">
          <span class="data-label">picture</span>
          <span class="data-value" id="data-picture"></span>
        </div>
      </div>

      <!-- Access Token Card -->
      <div class="card">
        <div class="card-title">Access Token (JWT)</div>
        <div class="token-box" id="token-box"></div>

        <button class="btn-verify" id="verify-btn" onclick="verifyToken()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Verify Token with Deevo
        </button>

        <div class="verify-result" id="verify-result"></div>
      </div>
    </div>
  </div>

  <script>
    // Fetch user data from session
    async function loadUser() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) {
          window.location.href = '/?error=not_authenticated';
          return;
        }

        const data = await res.json();
        const { user, accessToken } = data;

        // Populate profile
        const avatarEl = document.getElementById('avatar');
        if (user.picture) {
          avatarEl.innerHTML = `<img src="${user.picture}" alt="" referrerPolicy="no-referrer">`;
        } else {
          avatarEl.textContent = (user.name || user.email || '?')[0].toUpperCase();
        }

        document.getElementById('user-name').textContent = user.name || 'Deevo User';
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-sub').textContent = 'UID: ' + user.sub;

        // Raw data
        document.getElementById('data-sub').textContent = user.sub;
        document.getElementById('data-name').textContent = user.name;
        document.getElementById('data-email').textContent = user.email;
        document.getElementById('data-picture').textContent = user.picture || '(none)';

        // Token
        document.getElementById('token-box').textContent = accessToken;

        // Show content
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

      } catch (err) {
        console.error('Failed to load user:', err);
        window.location.href = '/?error=load_failed';
      }
    }

    // Verify the token against Deevo's API
    async function verifyToken() {
      const btn = document.getElementById('verify-btn');
      const resultEl = document.getElementById('verify-result');

      btn.disabled = true;
      btn.textContent = 'Verifying...';
      resultEl.className = 'verify-result';
      resultEl.style.display = 'none';

      try {
        const res = await fetch('/api/verify');
        const data = await res.json();

        if (data.valid) {
          resultEl.className = 'verify-result success';
          resultEl.innerHTML = `✓ <strong>Token is valid!</strong> Server confirmed: ${data.user.email} (${data.user.name})`;
        } else {
          resultEl.className = 'verify-result error';
          resultEl.innerHTML = `✗ <strong>Token is invalid:</strong> ${data.error}`;
        }
      } catch (err) {
        resultEl.className = 'verify-result error';
        resultEl.innerHTML = `✗ <strong>Verification failed:</strong> ${err.message}`;
      }

      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Verify Again`;
    }

    // Load on page ready
    loadUser();
  </script>
</body>
</html>
